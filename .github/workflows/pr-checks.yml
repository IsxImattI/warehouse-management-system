name: PR Checks

on:
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/WMS.slnx

      - name: Build
        run: dotnet build backend/WMS.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test backend/WMS.slnx --no-build --configuration Release